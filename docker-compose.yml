version: '3.8'

services:

  mongodb:
    image: mongo:7.0

    container_name: mongodb

    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: secret

    volumes:
      - mongo-data:/data/db

    ports:
      - "27017:27017"

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 5

    networks:
      - fullstack-chatapp



  backend:
#    image: munafshaik/chatapp-backend:${BACKEND_DOCKER_TAG}
    image: munafshaik/chatapp-backend:v1
    container_name: full-stack-backend

    restart: unless-stopped

    depends_on:
      mongodb:
        condition: service_healthy

    environment:
      NODE_ENV: production
      PORT: 5001

      MONGODB_URI: mongodb://mongoadmin:secret@mongodb:27017/dbname?authSource=admin
      JWT_SECRET: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..qE3lxrcV9TM3nujRqJVeCHPd_4WFPO9eVZj8A_kjabI
#      JWT_SECRET: ${JWT_SECRET}

    ports:
      - "5001:5001"

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 20s
      timeout: 10s
      retries: 5

    networks:
      - fullstack-chatapp



  frontend:
#    image: munafshaik/chatapp-frontend:${FRONTEND_DOCKER_TAG}
    image: munafshaik/chatapp-frontend:v1
    container_name: full-stack-frontend

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "3000:80"

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

    networks:
      - fullstack-chatapp



networks:
  fullstack-chatapp:
    driver: bridge



volumes:
  mongo-data: